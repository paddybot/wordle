<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wordle</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #6aaa64;
  --yellow: #c9b458;
  --grey: #787c7e;
  --dark-grey: #3a3a3c;
  --light-grey: #d3d6da;
  --bg: #121213;
  --tile-bg: #121213;
  --tile-border: #3a3a3c;
  --text: #ffffff;
  --key-bg: #818384;
}

/* Monkey theme */
body.monkey {
  --green: #e86820;
  --yellow: #f0c830;
  --grey: #7a8a6a;
  --dark-grey: #3a5a30;
  --light-grey: #5a7a4a;
  --bg: #2a4a20;
  --tile-bg: rgba(20,35,15,0.85);
  --tile-border: #4a6a3a;
  --text: #e8e0d0;
  --key-bg: rgba(30,50,20,0.9);
  background:
    /* Leaf canopy overlay */
    radial-gradient(ellipse 80px 40px at 15% 8%, rgba(40,80,20,0.7) 0%, transparent 100%),
    radial-gradient(ellipse 60px 35px at 75% 5%, rgba(50,90,30,0.6) 0%, transparent 100%),
    radial-gradient(ellipse 90px 45px at 45% 3%, rgba(35,75,20,0.7) 0%, transparent 100%),
    radial-gradient(ellipse 70px 30px at 90% 10%, rgba(45,85,25,0.5) 0%, transparent 100%),
    radial-gradient(ellipse 50px 25px at 5% 15%, rgba(55,95,35,0.4) 0%, transparent 100%),
    /* Vine streaks */
    linear-gradient(175deg, transparent 48%, rgba(30,70,15,0.3) 49%, rgba(30,70,15,0.3) 49.5%, transparent 50%),
    linear-gradient(185deg, transparent 30%, rgba(25,65,12,0.2) 30.5%, rgba(25,65,12,0.2) 31%, transparent 31.5%),
    /* Dappled sunlight */
    radial-gradient(circle 30px at 20% 30%, rgba(180,160,60,0.08) 0%, transparent 100%),
    radial-gradient(circle 25px at 60% 50%, rgba(180,160,60,0.06) 0%, transparent 100%),
    radial-gradient(circle 35px at 80% 70%, rgba(180,160,60,0.07) 0%, transparent 100%),
    radial-gradient(circle 20px at 35% 80%, rgba(180,160,60,0.05) 0%, transparent 100%),
    /* Base gradient - deep jungle */
    linear-gradient(180deg, #1a3a12 0%, #2a4a20 30%, #1e3818 70%, #152a10 100%);
  background-attachment: fixed;
}
body.monkey .tile.correct {
  background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23e86820' width='100' height='100' rx='4'/><text y='78' x='12' font-size='72' opacity='0.3'>🍌</text></svg>") center/cover !important;
  border-color: #c05818 !important;
  color: white !important;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
}
body.monkey .tile.present {
  background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f0c830' width='100' height='100' rx='4'/><text y='78' x='12' font-size='72' opacity='0.25'>🐒</text></svg>") center/cover !important;
  border-color: #d0a820 !important;
  color: #2a1a08 !important;
  text-shadow: 1px 1px 1px rgba(255,255,255,0.4);
}
body.monkey .tile.absent {
  background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23485840' width='100' height='100' rx='4'/><text y='78' x='12' font-size='72' opacity='0.2'>🌴</text></svg>") center/cover !important;
  border-color: #3a4830 !important;
  color: #a0b890 !important;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
body.monkey .tile.filled { border-color: #8a8070 !important; }
body.monkey .tile.filled { border-color: #6a8a5a !important; color: #e8e0d0 !important; }
body.monkey .key.correct { background: var(--green) !important; color: white !important; }
body.monkey .key.present { background: var(--yellow) !important; color: #2a1a08 !important; }
body.monkey .key.absent { background: rgba(20,35,15,0.8) !important; color: #6a7a5a !important; }
body.monkey .key { color: #c8d8b0; background: rgba(40,65,30,0.85); }
body.monkey header { border-color: rgba(80,120,50,0.4); background: rgba(15,30,10,0.6); }
body.monkey #date-nav { border-color: rgba(80,120,50,0.4); background: rgba(15,30,10,0.4); }
body.monkey .nav-arrow { color: #a0c080; }
body.monkey .nav-arrow:hover { background: rgba(60,90,40,0.5); }
body.monkey .nav-arrow:disabled { color: #4a6a3a; }
body.monkey #today-nav-btn { background: #e86820; }
body.monkey #date-text, body.monkey #date-day-num { color: #c8d8b0; }
body.monkey .toast { background: #1a3012; color: #c8d8a0; border: 1px solid #4a6a3a; }
body.monkey .modal-box { background: rgba(20,38,15,0.95); color: #d8e0c8; border: 1px solid #4a6a3a; }
body.monkey .modal-box p, body.monkey .stat .label, body.monkey #history-section h3 { color: #8aaa70; }
body.monkey .modal-box .bar { background: #2a4a20; }
body.monkey .modal-box .bar.highlight { background: #e86820; }
body.monkey .modal-overlay { background: rgba(10,20,8,0.7); }
body.monkey .setting-row { border-color: #3a5a30; }
body.monkey .setting-info .setting-desc { color: #8aaa70; }
body.monkey .toggle .slider { background: #3a5a30; }
body.monkey .toggle input:checked + .slider { background: #e86820; }
body.monkey .history-row { border-color: #2a4a20; }
body.monkey .h-date { color: #8aaa70 !important; }
body.monkey .h-result.win { color: #e86820 !important; }
body.monkey .h-result.loss { color: #7a8a6a !important; }
body.monkey .share-btn { background: #e86820 !important; }
body.monkey #hard-badge { color: #e86820; }

/* Monkey fun font */
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
body.monkey, body.monkey .key, body.monkey .tile, body.monkey .m-header {
  font-family: 'Fredoka', 'Helvetica Neue', Arial, sans-serif !important;
}
body.monkey h1 { letter-spacing: 6px; font-size: 30px; }

/* Floating jungle emojis */
body.monkey #jungle-bg {
  display: block !important;
}
#jungle-bg {
  display: none;
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
#app { position: relative; z-index: 1; }
.jungle-float {
  position: absolute;
  font-size: 28px;
  opacity: 0.15;
  animation: jungleFloat linear infinite;
  pointer-events: none;
}
@keyframes jungleFloat {
  0% { transform: translateY(110vh) rotate(0deg); }
  100% { transform: translateY(-10vh) rotate(360deg); }
}

/* Bouncy tile pop in monkey mode */
body.monkey .tile.filled {
  animation: monkeyPop 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}
@keyframes monkeyPop {
  0% { transform: scale(0.8); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* Wiggle animation for keyboard keys */
body.monkey .key:active {
  animation: keyWiggle 0.2s ease;
}
@keyframes keyWiggle {
  0%, 100% { transform: rotate(0); }
  25% { transform: rotate(-4deg) scale(0.95); }
  75% { transform: rotate(4deg) scale(1.05); }
}

/* Win celebration - banana confetti container */
#confetti {
  display: none;
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 300;
  overflow: hidden;
}
#confetti.active { display: block; }
.confetti-piece {
  position: absolute;
  top: -40px;
  font-size: 30px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
}

/* Monkey header bounce */
body.monkey h1 {
  animation: headerBob 3s ease-in-out infinite;
}
@keyframes headerBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* Fun nav arrows */
body.monkey .nav-arrow { font-size: 22px; transition: transform 0.2s; }
body.monkey .nav-arrow:active { transform: scale(1.3); }

/* Pulsing monkey button */
body.monkey #monkey-btn {
  animation: monkeyPulse 2s ease-in-out infinite;
}
@keyframes monkeyPulse {
  0%, 100% { transform: scale(1.15) rotate(0); }
  25% { transform: scale(1.2) rotate(-5deg); }
  75% { transform: scale(1.2) rotate(5deg); }
}

/* Toast styling in monkey mode */
body.monkey .toast {
  border-radius: 16px;
  font-size: 15px;
  padding: 14px 24px;
}

/* ═══ MONKEY MASCOT ═══ */
#mascot-area {
  display: none;
  flex-shrink: 0;
  text-align: center;
  padding: 0;
  position: relative;
  height: 56px;
  z-index: 50;
}
body.monkey #mascot-area { display: block; }

#mascot {
  font-size: 48px;
  display: inline-block;
  animation: mascotIdle 2s ease-in-out infinite;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  transition: transform 0.3s;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
#mascot:active { transform: scale(1.5) !important; }

@keyframes mascotIdle {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  25% { transform: translateY(-6px) rotate(4deg); }
  50% { transform: translateY(-2px) rotate(-2deg); }
  75% { transform: translateY(-8px) rotate(5deg); }
}
@keyframes mascotExcited {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.3) rotate(-10deg); }
  30% { transform: scale(1.2) rotate(12deg); }
  45% { transform: scale(1.4) rotate(-8deg); }
  60% { transform: scale(1.1) rotate(6deg); }
}
@keyframes mascotWorried {
  0%, 100% { transform: translateX(0) scale(1); }
  15% { transform: translateX(-12px) rotate(-8deg) scale(1.1); }
  30% { transform: translateX(12px) rotate(8deg) scale(1.15); }
  45% { transform: translateX(-8px) rotate(-5deg) scale(1.1); }
  60% { transform: translateX(8px) rotate(5deg) scale(1.05); }
}
@keyframes mascotWin {
  0% { transform: scale(1) rotate(0); }
  10% { transform: scale(1.8) rotate(-20deg) translateY(-20px); }
  25% { transform: scale(1.6) rotate(25deg) translateY(-30px); }
  40% { transform: scale(2.0) rotate(-15deg) translateY(-20px); }
  55% { transform: scale(1.7) rotate(20deg) translateY(-35px); }
  70% { transform: scale(1.5) rotate(-10deg) translateY(-15px); }
  85% { transform: scale(1.3) rotate(5deg) translateY(-5px); }
  100% { transform: scale(1) rotate(0) translateY(0); }
}
@keyframes mascotLose {
  0%, 100% { transform: rotate(0) translateY(0) scale(1); }
  20% { transform: rotate(-8deg) translateY(4px) scale(1.1); }
  50% { transform: rotate(8deg) translateY(6px) scale(1.15); }
  80% { transform: rotate(-5deg) translateY(3px) scale(1.05); }
}
@keyframes mascotIntrude {
  0% { transform: scale(1) translateY(0); }
  20% { transform: scale(2.5) translateY(40px); }
  40% { transform: scale(2.2) translateY(35px) rotate(10deg); }
  60% { transform: scale(2.5) translateY(40px) rotate(-10deg); }
  80% { transform: scale(1.5) translateY(15px); }
  100% { transform: scale(1) translateY(0); }
}
#mascot.excited { animation: mascotExcited 0.8s ease !important; }
#mascot.worried { animation: mascotWorried 0.6s ease !important; }
#mascot.win { animation: mascotWin 2s ease !important; }
#mascot.lose { animation: mascotLose 2.5s ease-in-out infinite !important; }
#mascot.intrude { animation: mascotIntrude 2s ease !important; z-index: 999; }

/* Speech bubble - BIGGER and more obnoxious */
#speech-bubble {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(25px);
  background: #ffee00;
  color: #1a1000;
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  box-shadow: 0 3px 12px rgba(0,0,0,0.4);
  border: 2px solid #e8a000;
  max-width: 240px;
  white-space: normal;
  text-align: center;
  z-index: 999;
}
#speech-bubble.show { opacity: 1; animation: bubblePop 0.3s ease; }
@keyframes bubblePop {
  0% { transform: translateX(25px) scale(0); }
  50% { transform: translateX(25px) scale(1.15); }
  100% { transform: translateX(25px) scale(1); }
}
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 15px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid #ffee00;
}

/* Slot machine glow effect on tiles */
body.monkey .tile.reveal {
  animation: slotReveal 0.5s ease forwards !important;
}
@keyframes slotReveal {
  0% { transform: rotateX(0) scale(1); box-shadow: none; }
  30% { transform: rotateX(90deg) scale(1.05); }
  50% { transform: rotateX(90deg) scale(1.05); box-shadow: 0 0 20px rgba(232,168,0,0.6); }
  100% { transform: rotateX(0) scale(1); box-shadow: 0 0 8px rgba(232,168,0,0.3); }
}

/* Neon glow on correct tiles */
body.monkey .tile.correct {
  box-shadow: 0 0 12px rgba(232,104,32,0.6), 0 0 24px rgba(232,104,32,0.3) !important;
}
body.monkey .tile.present {
  box-shadow: 0 0 10px rgba(240,200,48,0.5), 0 0 20px rgba(240,200,48,0.2) !important;
}

/* Screen flash on all-correct */
@keyframes screenFlash {
  0% { opacity: 0; }
  20% { opacity: 0.3; }
  100% { opacity: 0; }
}
#screen-flash {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(255,238,0,0.4), rgba(232,104,32,0.2));
  z-index: 250;
  pointer-events: none;
}
#screen-flash.active {
  display: block;
  animation: screenFlash 1s ease forwards;
}

/* Vine decorations */
body.monkey #vine-left, body.monkey #vine-right { display: block; }
#vine-left, #vine-right {
  display: none;
  position: fixed;
  font-size: 30px;
  z-index: 0;
  opacity: 0.25;
  pointer-events: none;
  line-height: 1.1;
}
#vine-left { top: 60px; left: 2px; }
#vine-right { top: 80px; right: 2px; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
}

/* Header */
header {
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid var(--dark-grey);
  padding: 12px 16px;
  flex-shrink: 0;
  position: relative;
}
header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
}
#settings-btn, #monkey-btn {
  position: absolute;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}
#settings-btn { right: 16px; }
#monkey-btn { left: 50px; transition: transform 0.3s; }
#monkey-btn:hover { transform: scale(1.2); }
#monkey-btn.active { transform: scale(1.15); }
#hard-badge {
  position: absolute;
  left: 90px;
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: none;
}
#hard-badge.show { display: block; }

/* Toast */
#toast-container {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.toast {
  background: var(--text);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  animation: fadeIn 0.15s ease;
  white-space: nowrap;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* Board */
#board-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  padding: 10px 0;
  min-height: 0; /* allow flex shrinking */
}
#board {
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 5px;
  /* Size based on tile width: 5 tiles + 4 gaps */
  --tile-size: min(58px, 12vw);
  width: calc(var(--tile-size) * 5 + 5px * 4);
  height: calc(var(--tile-size) * 6 + 5px * 5);
  max-height: 100%;
  max-width: 100%;
}
.row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}
.tile {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: min(2rem, 7vw);
  font-weight: 700;
  text-transform: uppercase;
  border: 2px solid var(--tile-border);
  background: var(--tile-bg);
  transition: transform 0.1s;
}
.tile.filled { border-color: #565758; animation: pop 0.1s ease; }
.tile.reveal { animation: flip 0.5s ease forwards; }
@keyframes pop { 50% { transform: scale(1.1); } }
@keyframes flip {
  0% { transform: rotateX(0); }
  45% { transform: rotateX(90deg); }
  55% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
.tile.correct { background: var(--green); border-color: var(--green); }
.tile.present { background: var(--yellow); border-color: var(--yellow); }
.tile.absent  { background: var(--grey);  border-color: var(--grey); }

.row.shake { animation: shake 0.5s ease; }
@keyframes shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(4px); }
  30%, 50%, 70% { transform: translateX(-6px); }
  40%, 60% { transform: translateX(6px); }
}

.tile.bounce { animation: bounce 1s ease; }
@keyframes bounce {
  0%, 20% { transform: translateY(0); }
  40% { transform: translateY(-30px); }
  50% { transform: translateY(5px); }
  60% { transform: translateY(-15px); }
  80% { transform: translateY(2px); }
  100% { transform: translateY(0); }
}

/* Keyboard */
#keyboard { padding: 8px 6px; flex-shrink: 0; }
.kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
.key {
  height: 52px;
  min-width: 30px;
  padding: 0 8px;
  border: none;
  border-radius: 4px;
  background: var(--key-bg);
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  flex: 1;
  max-width: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s;
}
.key.wide { max-width: 66px; font-size: 12px; }
.key.correct { background: var(--green); }
.key.present { background: var(--yellow); }
.key.absent  { background: var(--dark-grey); }

/* Modal overlay (shared) */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #1a1a1b;
  border-radius: 12px;
  padding: 28px 24px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}

/* Stats modal */
#modal h2 { font-size: 22px; margin-bottom: 12px; }
#modal p { font-size: 14px; color: #aaa; margin-bottom: 6px; }
#modal .stat-row { display: flex; justify-content: center; gap: 16px; margin: 16px 0; }
#modal .stat { text-align: center; }
#modal .stat .num { font-size: 28px; font-weight: 700; }
#modal .stat .label { font-size: 11px; color: #aaa; }
#modal .bar-chart { margin: 12px 0; text-align: left; }
#modal .bar-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 13px; }
#modal .bar-row .bar {
  background: var(--dark-grey);
  color: white;
  padding: 2px 6px;
  min-width: 20px;
  text-align: right;
  font-size: 12px;
  font-weight: 700;
}
#modal .bar-row .bar.highlight { background: var(--green); }
#modal button.share-btn {
  margin-top: 16px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 24px;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
#next-timer { font-size: 20px; font-weight: 700; margin-top: 8px; }

/* Settings modal */
#settings-modal .modal-box { text-align: left; }
#settings-modal h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--dark-grey);
}
.setting-row:last-child { border-bottom: none; }
.setting-info { flex: 1; padding-right: 16px; }
.setting-info .setting-name { font-size: 15px; font-weight: 600; }

const WORD_LENGTH = 5;
const MAX_GUESSES = 6;
const WORDLE_EPOCH = new Date(2021, 5, 19); // June 19, 2021

// ─── Game state ───
let targetWord = '';
let currentRow = 0;
let currentCol = 0;
let currentGuess = '';
let gameOver = false;
let boardState = [];
let letterStates = {};
let hardMode = false;
let selectedDate = null; // null = today, else 'YYYY-MM-DD'
let historyData = null; // loaded from words-history.json

// ─── Daily word selection ───
function getDayNumber() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - WORDLE_EPOCH) / 86400000);
}

function getActiveDateStr() {
  if (selectedDate) return selectedDate;
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function fetchWordData() {
  // Load both words.json (current week) and words-history.json (archive)
  try {
    const [resp1, resp2] = await Promise.all([
      fetch('words.json?t=' + Date.now()).catch(() => null),
      fetch('words-history.json?t=' + Date.now()).catch(() => null)
    ]);
    if (resp1 && resp1.ok) NYT_WORDS = await resp1.json();
    if (resp2 && resp2.ok) historyData = await resp2.json();
  } catch (e) {
    console.warn('Could not fetch word data:', e);
  }
}

function getWordForDate(dateStr) {
  // Check current week data first, then history
  if (NYT_WORDS && NYT_WORDS[dateStr] && NYT_WORDS[dateStr].solution) {
    const word = NYT_WORDS[dateStr].solution.toLowerCase();
    VALID_GUESSES.add(word);
    return word.toUpperCase();
  }
  if (historyData && historyData[dateStr] && historyData[dateStr].solution) {
    const word = historyData[dateStr].solution.toLowerCase();
    VALID_GUESSES.add(word);
    return word.toUpperCase();
  }
  return null;
}

function getDailyWordFallback() {
  const day = getDayNumber();
  return FALLBACK_ANSWERS[day % FALLBACK_ANSWERS.length].toUpperCase();
}

function getGameKey() {
  const ds = getActiveDateStr();
  return `wordle-${ds}`;
}

function getTodayKey() {
  return getGameKey();
}

function getDateFromKey(key) {
  const m = key.match(/wordle-(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return `${m[3]}/${m[2]}/${m[1]}`;
}

// ─── Stats ───
function loadStats() {
  try { return JSON.parse(localStorage.getItem('wordle-stats')) || defaultStats(); }
  catch { return defaultStats(); }
}
function defaultStats() {
  return { played: 0, won: 0, streak: 0, maxStreak: 0, dist: [0,0,0,0,0,0], lastDate: null };
}
function saveStats(stats) { localStorage.setItem('wordle-stats', JSON.stringify(stats)); }

// ─── Game history (cross-day) ───
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('wordle-history')) || []; }
  catch { return []; }
}
function saveHistory(history) { localStorage.setItem('wordle-history', JSON.stringify(history)); }

function recordGame(won, guesses) {
  const history = loadHistory();
  const entry = { date: getTodayKey(), day: getDayNumber(), won, guesses, hardMode };
  // Don't duplicate
  if (!history.find(h => h.date === entry.date)) {
    history.push(entry);
    // Keep last 100
    if (history.length > 100) history.shift();
    saveHistory(history);
  }
}

// ─── Settings ───
function loadSettings() {
  try { return JSON.parse(localStorage.getItem('wordle-settings')) || {}; }
  catch { return {}; }
}
function saveSettings(s) { localStorage.setItem('wordle-settings', JSON.stringify(s)); }

function toggleHardMode(on) {
  // Can't turn on hard mode mid-game if guesses already made
  if (on && currentRow > 0 && !gameOver) {
    showToast('Hard Mode can only be enabled at the start of a round', 2000);
    document.getElementById('hard-mode-toggle').checked = false;
    return;
  }
  hardMode = on;
  const settings = loadSettings();
  settings.hardMode = on;
  saveSettings(settings);
  document.getElementById('hard-badge').classList.toggle('show', on);
  // Also update toggle state
  document.getElementById('hard-mode-toggle').checked = on;
  // Disable toggle if game in progress
  updateHardModeToggle();
  saveGame();
}

function updateHardModeToggle() {
  const toggle = document.getElementById('hard-mode-toggle');
  toggle.disabled = currentRow > 0 && !gameOver && !hardMode;
}

// ─── Hard mode validation ───
function validateHardMode(guess) {
  if (!hardMode || boardState.length === 0) return null;

  // Build cumulative constraints from all previous guesses
  const mustBeAt = {}; // position -> letter (green)
  const mustInclude = {}; // letter -> Set of positions where it CAN'T be (yellow)

  for (const prev of boardState) {
    for (let i = 0; i < WORD_LENGTH; i++) {
      const letter = prev.guess[i];
      const state = prev.result[i];

      if (state === 'correct') {
        mustBeAt[i] = letter;
      }
      if (state === 'present') {
        if (!mustInclude[letter]) mustInclude[letter] = new Set();
        mustInclude[letter].add(i); // can't be at this position
      }
    }
  }

  // Track letters confirmed absent (grey in all appearances, never green/yellow)
  const knownAbsent = new Set();
  const knownUsed = new Set(); // letters that are green or yellow somewhere
  for (const prev of boardState) {
    for (let i = 0; i < WORD_LENGTH; i++) {
      const letter = prev.guess[i];
      const state = prev.result[i];
      if (state === 'correct' || state === 'present') {
        knownUsed.add(letter);
      }
    }
  }
  for (const prev of boardState) {
    for (let i = 0; i < WORD_LENGTH; i++) {
      const letter = prev.guess[i];
      if (prev.result[i] === 'absent' && !knownUsed.has(letter)) {
        knownAbsent.add(letter);
      }
    }
  }

  // Check green constraints
  for (const [pos, letter] of Object.entries(mustBeAt)) {
    if (guess[pos] !== letter) {
      return `${ordinal(Number(pos)+1)} letter must be ${letter}`;
    }
  }

  // Check yellow constraints: letter must appear, and not in a previously-yellow position
  for (const [letter, badPositions] of Object.entries(mustInclude)) {
    if (!guess.includes(letter)) {
      return `Guess must contain ${letter}`;
    }
    for (const pos of badPositions) {
      if (guess[pos] === letter && !mustBeAt[pos]) {
        return `${letter} can't be ${ordinal(pos+1)} letter`;
      }
    }
  }

  // Check absent constraint: can't reuse letters confirmed as not in the word
  for (let i = 0; i < WORD_LENGTH; i++) {
    if (knownAbsent.has(guess[i])) {
      return `${guess[i]} is not in the word`;
    }
  }

  return null;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// ─── Save/Load game ───
function saveGame() {
  localStorage.setItem(getTodayKey(), JSON.stringify({
    boardState, currentRow, currentCol, currentGuess, gameOver, letterStates, hardMode
  }));
}
function loadGame() {
  try { return JSON.parse(localStorage.getItem(getTodayKey())); } catch { return null; }
}

// ─── Build board ───
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

// ─── Build keyboard ───
function buildKeyboard() {
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.id = `key-${key}`;
      btn.addEventListener('click', () => handleKey(key));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

// ─── Toast ───
function showToast(msg, duration = 1500) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, duration - 300);
  setTimeout(() => container.removeChild(toast), duration);
}

// ─── Input handling ───
function handleKey(key) {
  if (gameOver) return;
  if (key === '⌫' || key === 'BACKSPACE') {
    if (currentCol > 0) {
      currentCol--;
      currentGuess = currentGuess.slice(0, -1);
      const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
      tile.textContent = '';
      tile.classList.remove('filled');
    }
  } else if (key === 'ENTER') {
    submitGuess();
  } else if (key.length === 1 && /^[A-Z]$/i.test(key) && currentCol < WORD_LENGTH) {
    const letter = key.toUpperCase();
    const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
    tile.textContent = letter;
    tile.classList.add('filled');
    currentGuess += letter;
    currentCol++;
  }
}

// ─── Submit guess ───
function submitGuess() {
  if (currentCol < WORD_LENGTH) {
    shakeRow(currentRow);
    showToast('Not enough letters');
    return;
  }
  if (!VALID_GUESSES.has(currentGuess.toLowerCase())) {
    shakeRow(currentRow);
    showToast('Not in word list');
    return;
  }
  // Reject duplicate guesses
  if (boardState.some(prev => prev.guess === currentGuess)) {
    shakeRow(currentRow);
    showToast('Already guessed');
    return;
  }

  // Hard mode check
  const hardError = validateHardMode(currentGuess);
  if (hardError) {
    shakeRow(currentRow);
    showToast(hardError, 2000);
    return;
  }

  const result = evaluateGuess(currentGuess, targetWord);
  boardState.push({ guess: currentGuess, result });
  revealRow(currentRow, result);
  // Mascot reacts after tiles reveal
  setTimeout(() => mascotReactToGuess(result), WORD_LENGTH * 300 + 100);

  const won = result.every(r => r === 'correct');
  if (won) {
    gameOver = true;
    const wonRow = currentRow; // capture before incrementing
    setTimeout(() => {
      bounceRow(wonRow);
      const isMonkey = document.body.classList.contains('monkey');
      if (isMonkey) {
        showToast(getMonkeyWinMessage(wonRow), 3000);
        launchConfetti();
      } else {
        const msgs = ['Genius', 'Magnificent', 'Impressive', 'Splendid', 'Great', 'Phew'];
        showToast(msgs[wonRow] || 'Nice!');
      }
    }, WORD_LENGTH * 300 + 200);
    setTimeout(() => {
      const stats = loadStats();
      stats.played++;
      stats.won++;
      // Streak: check if last game was yesterday
      const today = getTodayKey();
      if (stats.lastDate) {
        const last = new Date(stats.lastDate.replace('wordle-',''));
        const now = new Date(today.replace('wordle-',''));
        const diffDays = Math.round((now - last) / 86400000);
        if (diffDays === 1) {
          stats.streak++;
        } else if (diffDays > 1) {
          stats.streak = 1;
        }
        // diffDays === 0 shouldn't happen (same day), keep streak
      } else {
        stats.streak = 1;
      }
      stats.maxStreak = Math.max(stats.maxStreak, stats.streak);
      stats.dist[wonRow]++;
      stats.lastDate = today;
      saveStats(stats);
      recordGame(true, wonRow + 1);
      showStatsModal(stats, wonRow);
    }, WORD_LENGTH * 300 + 1600);
    currentRow++;
    saveGame();
    updateHardModeToggle();
    return;
  }

  currentRow++;
  currentCol = 0;
  currentGuess = '';

  if (currentRow >= MAX_GUESSES) {
    gameOver = true;
    setTimeout(() => {
      const isMonkey = document.body.classList.contains('monkey');
      if (isMonkey) {
        setMascot('lose', 'lose', 'lose', 5000);
      }
      showToast(isMonkey ? getMonkeyLoseMessage() + '\n' + targetWord : targetWord, 3500);
    }, WORD_LENGTH * 300 + 200);
    setTimeout(() => {
      const stats = loadStats();
      stats.played++;
      stats.streak = 0;
      stats.lastDate = getTodayKey();
      saveStats(stats);
      recordGame(false, -1);
      showStatsModal(stats, -1);
    }, WORD_LENGTH * 300 + 1600);
  }
  saveGame();
  updateHardModeToggle();
}

// ─── Evaluate guess ───
function evaluateGuess(guess, target) {
  const result = Array(WORD_LENGTH).fill('absent');
  const targetArr = target.split('');
  const guessArr = guess.split('');
  const used = Array(WORD_LENGTH).fill(false);

  for (let i = 0; i < WORD_LENGTH; i++) {
    if (guessArr[i] === targetArr[i]) {
      result[i] = 'correct';
      used[i] = true;
    }
  }
  for (let i = 0; i < WORD_LENGTH; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < WORD_LENGTH; j++) {
      if (!used[j] && guessArr[i] === targetArr[j]) {
        result[i] = 'present';
        used[j] = true;
        break;
      }
    }
  }
  return result;
}

// ─── Reveal animation ───
function revealRow(row, result) {
  const guess = boardState[row].guess;
  for (let i = 0; i < WORD_LENGTH; i++) {
    const tile = document.getElementById(`tile-${row}-${i}`);
    setTimeout(() => {
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.add(result[i]);
        updateKeyboard(guess[i], result[i]);
      }, 250);
    }, i * 300);
  }
}

// ─── Keyboard colors ───
const priority = { correct: 3, present: 2, absent: 1 };
function updateKeyboard(letter, state) {
  const key = document.getElementById(`key-${letter}`);
  if (!key) return;
  const current = letterStates[letter];
  if (!current || priority[state] > priority[current]) {
    letterStates[letter] = state;
    key.className = 'key' + (key.textContent.length > 1 ? ' wide' : '') + ' ' + state;
  }
}

// ─── Row animations ───
function shakeRow(row) {
  const el = document.getElementById(`row-${row}`);
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
}
function bounceRow(row) {
  for (let i = 0; i < WORD_LENGTH; i++) {
    const tile = document.getElementById(`tile-${row}-${i}`);
    setTimeout(() => tile.classList.add('bounce'), i * 100);
  }
}

// ─── Stats Modal ───
function showStatsModal(stats, wonRow) {
  document.getElementById('s-played').textContent = stats.played;
  document.getElementById('s-win').textContent = stats.played ? Math.round(100 * stats.won / stats.played) : 0;
  document.getElementById('s-streak').textContent = stats.streak;
  document.getElementById('s-max').textContent = stats.maxStreak;
  document.getElementById('modal-title').textContent = wonRow >= 0 ? 'You Won!' : 'Better Luck Next Time';

  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  const maxVal = Math.max(...stats.dist, 1);
  for (let i = 0; i < 6; i++) {
    const row = document.createElement('div');
    row.className = 'bar-row';
    const label = document.createElement('span');
    label.textContent = i + 1;
    const bar = document.createElement('div');
    bar.className = 'bar' + (i === wonRow ? ' highlight' : '');
    bar.style.width = Math.max(8, (stats.dist[i] / maxVal) * 100) + '%';
    bar.textContent = stats.dist[i];
    row.appendChild(label);
    row.appendChild(bar);
    chart.appendChild(row);
  }

  // Render history
  const histList = document.getElementById('history-list');
  histList.innerHTML = '';
  const history = loadHistory().slice(-15).reverse();
  history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const dateSpan = document.createElement('span');
    dateSpan.className = 'h-date';
    dateSpan.textContent = getDateFromKey(h.date) + (h.hardMode ? ' ★' : '');
    const resultSpan = document.createElement('span');
    resultSpan.className = 'h-result ' + (h.won ? 'win' : 'loss');
    resultSpan.textContent = h.won ? `${h.guesses}/6` : 'X/6';
    row.appendChild(dateSpan);
    row.appendChild(resultSpan);
    histList.appendChild(row);
  });

  document.getElementById('stats-overlay').classList.add('show');
  updateTimer();
}

function updateTimer() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - now;
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  document.getElementById('next-timer').textContent = `${h}:${m}:${s}`;
  if (gameOver) setTimeout(updateTimer, 1000);
}

// ─── Settings Modal ───
function openSettings() {
  const ds = getActiveDateStr();
  const entry = (NYT_WORDS && NYT_WORDS[ds]) || (historyData && historyData[ds]);
  const dayNum = entry ? entry.day : getDayNumber();
  document.getElementById('day-number-label').textContent = `Wordle #${dayNum}`;
  document.getElementById('hard-mode-toggle').checked = hardMode;
  updateHardModeToggle();
  document.getElementById('settings-modal').classList.add('show');
}

// ─── Date nav bar ───
function updateDateNav() {
  const ds = getActiveDateStr();
  const todayStr = getTodayDateStr();
  const isToday = ds === todayStr;

  // Format date label
  const d = new Date(ds + 'T12:00:00');
  const dateText = isToday ? 'Today' : d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  document.getElementById('date-text').textContent = dateText;

  // Day number
  const entry = (NYT_WORDS && NYT_WORDS[ds]) || (historyData && historyData[ds]);
  const dayNum = entry ? entry.day : getDayNumber();
  document.getElementById('date-day-num').textContent = `#${dayNum}`;

  // Today button visibility
  document.getElementById('today-nav-btn').classList.toggle('show', !isToday);

  // Disable forward arrow if at today
  document.getElementById('next-day').disabled = isToday;

  // Hidden input config
  const inp = document.getElementById('date-hidden-input');
  inp.value = ds;
  inp.max = todayStr;
  inp.min = '2024-03-17';
}

let datePickerOpen = false;

function openDatePicker() {
  const inp = document.getElementById('date-hidden-input');
  datePickerOpen = true;
  if (inp.showPicker) {
    inp.showPicker();
  } else {
    inp.focus();
    inp.click();
  }
}

function handleDateInput(value) {

  if (!datePickerOpen) return; // ignore accidental triggers
  datePickerOpen = false;
  if (value) changeDate(value);
}

function stepDate(delta) {
  const ds = getActiveDateStr();
  const d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  const newDs = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // Don't go beyond today
  if (newDs > getTodayDateStr()) return;
  // Don't go before earliest data
  if (newDs < '2024-03-17') {
    showToast('No puzzle data before March 2024', 1500);
    return;
  }

  changeDate(newDs);
}

// ─── Date switching ───
function changeDate(dateStr) {

  if (!dateStr) return;
  const todayStr = getTodayDateStr();
  if (dateStr === todayStr) {
    backToToday();
    return;
  }
  const word = getWordForDate(dateStr);
  if (!word) {
    showToast('No puzzle available for this date', 2000);
    return;
  }
  selectedDate = dateStr;
  resetGameState();
  targetWord = word;

  buildBoard();
  buildKeyboard();
  restoreSavedGame();
  updateDateNav();
  // Close settings if open
  document.getElementById('settings-modal').classList.remove('show');
}

function backToToday() {
  selectedDate = null;
  resetGameState();
  const word = getWordForDate(getTodayDateStr());
  targetWord = word || getDailyWordFallback();

  buildBoard();
  buildKeyboard();
  restoreSavedGame();
  updateDateNav();
  document.getElementById('settings-modal').classList.remove('show');
}

function resetGameState() {
  currentRow = 0;
  currentCol = 0;
  currentGuess = '';
  gameOver = false;
  boardState = [];
  letterStates = {};
}

function restoreSavedGame() {
  // Always use global setting as source of truth for hard mode
  const settings = loadSettings();
  hardMode = settings.hardMode || false;
  document.getElementById('hard-badge').classList.toggle('show', hardMode);
  document.getElementById('hard-mode-toggle').checked = hardMode;

  const saved = loadGame();
  if (saved) {
    boardState = saved.boardState || [];
    currentRow = saved.currentRow;
    currentCol = saved.currentCol;
    currentGuess = saved.currentGuess;
    gameOver = saved.gameOver;
    letterStates = saved.letterStates || {};

    boardState.forEach((entry, r) => {
      for (let c = 0; c < WORD_LENGTH; c++) {
        const tile = document.getElementById(`tile-${r}-${c}`);
        tile.textContent = entry.guess[c];
        tile.classList.add('filled', entry.result[c]);
      }
    });
    Object.entries(letterStates).forEach(([letter, state]) => {
      const key = document.getElementById(`key-${letter}`);
      if (key) key.classList.add(state);
    });

    if (gameOver) {
      setTimeout(() => showStatsModal(loadStats(),
        boardState.length <= MAX_GUESSES && boardState[boardState.length-1]?.result.every(r => r === 'correct')
          ? boardState.length - 1 : -1
      ), 500);
    }
  }
  updateHardModeToggle();
}

// ─── Share ───
function shareResult() {
  const emojiMap = { correct: '🟩', present: '🟨', absent: '⬛' };
  const day = getDayNumber();
  const won = boardState.length <= MAX_GUESSES && boardState[boardState.length-1]?.result.every(r => r === 'correct');
  let text = `Wordle ${day} ${won ? boardState.length : 'X'}/6${hardMode ? '*' : ''}\n\n`;
  boardState.forEach(row => {
    text += row.result.map(r => emojiMap[r]).join('') + '\n';
  });
  if (navigator.share) {
    navigator.share({ text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    showToast('Copied to clipboard!');
  }
}

// ─── Physical keyboard ───
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') {
    e.preventDefault(); // prevent Enter from also clicking focused buttons
    handleKey('ENTER');
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    handleKey('⌫');
  } else if (/^[a-zA-Z]$/.test(e.key)) {
    handleKey(e.key.toUpperCase());
  }
});

// ─── Monkey theme toggle ───
function toggleMonkeyTheme() {
  const isMonkey = document.body.classList.toggle('monkey');
  document.getElementById('monkey-btn').classList.toggle('active', isMonkey);
  document.getElementById('title-text').innerHTML = isMonkey ? 'Monkle' : 'Wordle';
  document.title = isMonkey ? '🐵 Monkle' : 'Wordle';
  const settings = loadSettings();
  settings.monkeyTheme = isMonkey;
  saveSettings(settings);
  if (isMonkey) {
    startJungleBackground();
    startMonkeyIntrusions();
  } else {
    stopJungleBackground();
    stopMonkeyIntrusions();
  }
}

function loadMonkeyTheme() {
  const settings = loadSettings();
  if (settings.monkeyTheme) {
    document.body.classList.add('monkey');
    document.getElementById('monkey-btn').classList.add('active');
    document.getElementById('title-text').innerHTML = 'Monkle';
    document.title = '🐵 Monkle';
    startJungleBackground();
    startMonkeyIntrusions();
  }
}

// ─── Floating jungle emojis ───
let jungleInterval = null;
function startJungleBackground() {
  if (jungleInterval) return;
  const container = document.getElementById('jungle-bg');
  const emojis = ['🌿','🍃','🌺','🦜','🍌','🐒','🌴','🦋','🪲','🍄','🌸','🐍','🥥','🪴','🐛'];

  function spawnEmoji() {
    const el = document.createElement('span');
    el.className = 'jungle-float';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (18 + Math.random() * 24) + 'px';
    el.style.opacity = 0.08 + Math.random() * 0.12;
    const duration = 12 + Math.random() * 18;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = -Math.random() * duration + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000);
  }

  // Seed initial batch
  for (let i = 0; i < 12; i++) spawnEmoji();
  jungleInterval = setInterval(spawnEmoji, 2500);
}

function stopJungleBackground() {
  if (jungleInterval) { clearInterval(jungleInterval); jungleInterval = null; }
  document.getElementById('jungle-bg').innerHTML = '';
}

// ─── Banana confetti on win ───
function launchConfetti() {
  if (!document.body.classList.contains('monkey')) return;
  const container = document.getElementById('confetti');
  container.classList.add('active');
  const emojis = ['🍌','🐒','⭐','🎉','🥳','🌟','🍌','🐵','🍌','✨'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('span');
    el.className = 'confetti-piece';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (20 + Math.random() * 20) + 'px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; container.classList.remove('active'); }, 6000);
}

function setMascot(face, speechCategory, animClass, duration) {
  if (!document.body.classList.contains('monkey')) return;
  const mascot = document.getElementById('mascot');
  const bubble = document.getElementById('speech-bubble');

  mascot.childNodes[0].textContent = MASCOT_FACES[face] || MASCOT_FACES.idle;

  mascot.className = '';
  if (animClass) {
    void mascot.offsetWidth;
    mascot.classList.add(animClass);
  }

  if (speechCategory && SPEECH[speechCategory]) {
    const msgs = SPEECH[speechCategory];
    bubble.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    bubble.classList.add('show');
    setTimeout(() => bubble.classList.remove('show'), duration || 3000);
  }

  if (face !== 'idle' && face !== 'lose') {
    setTimeout(() => {
      mascot.childNodes[0].textContent = MASCOT_FACES.idle;
      mascot.className = '';
    }, duration || 3000);
  }
}

function pokeMascot() {
  setMascot('poke', 'poke', 'worried', 2000);
}

// Random monkey intrusion while playing
let intrudeTimer = null;
function startMonkeyIntrusions() {
  if (intrudeTimer) return;
  function scheduleIntrude() {
    const delay = 15000 + Math.random() * 30000; // 15-45s
    intrudeTimer = setTimeout(() => {
      if (!gameOver && document.body.classList.contains('monkey')) {
        // 50% chance of typing comment, 50% chance of full intrusion
        if (Math.random() < 0.5) {
          setMascot('typing', 'typing', null, 3000);
        } else {
          setMascot('intrude', 'intrude', 'intrude', 3000);
        }
        // Occasional idle trash talk
        setTimeout(() => {
          if (!gameOver) setMascot('idle', 'idle', null, 2500);
        }, 4000);
      }
      scheduleIntrude();
    }, delay);
  }
  scheduleIntrude();
}

function stopMonkeyIntrusions() {
  if (intrudeTimer) { clearTimeout(intrudeTimer); intrudeTimer = null; }
}

function mascotReactToGuess(result) {
  if (!document.body.classList.contains('monkey')) return;
  const correctCount = result.filter(r => r === 'correct').length;
  const presentCount = result.filter(r => r === 'present').length;

  if (correctCount === 5) {
    setMascot('win', 'win', 'win', 5000);
    // Screen flash
    const flash = document.getElementById('screen-flash');
    flash.classList.remove('active');
    void flash.offsetWidth;
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 1500);
  } else if (correctCount >= 3) {
    setMascot('happy', 'correct', 'excited', 3000);
  } else if (correctCount + presentCount >= 3) {
    setMascot('thinking', 'present', 'excited', 3000);
  } else if (correctCount + presentCount === 0) {
    // Full roast mode for all-wrong
    setMascot('worried', 'mostlyAbsent', 'intrude', 3500);
  } else if (presentCount > 0 && correctCount === 0) {
    setMascot('thinking', 'present', 'worried', 2500);
  } else {
    setMascot('worried', 'absent', 'worried', 2500);
  }
}

// ─── Close modals ───
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
});

// ─── Init ───
async function init() {
  // Fetch all word data (current week + history)
  await fetchWordData();

  // Get today's word
  const nytWord = getWordForDate(getTodayDateStr());
  targetWord = nytWord || getDailyWordFallback();

  buildBoard();
  buildKeyboard();
  loadMonkeyTheme();

  // Load settings
  const settings = loadSettings();
  hardMode = settings.hardMode || false;
  document.getElementById('hard-badge').classList.toggle('show', hardMode);
  document.getElementById('hard-mode-toggle').checked = hardMode;

  restoreSavedGame();
  updateDateNav();
}
