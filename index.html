<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wordle</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #6aaa64;
  --yellow: #c9b458;
  --grey: #787c7e;
  --dark-grey: #3a3a3c;
  --light-grey: #d3d6da;
  --bg: #121213;
  --tile-bg: #121213;
  --tile-border: #3a3a3c;
  --text: #ffffff;
  --key-bg: #818384;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
}

/* Header */
header {
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid var(--dark-grey);
  padding: 12px 16px;
  flex-shrink: 0;
  position: relative;
}
header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
}
#settings-btn {
  position: absolute;
  right: 16px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}
#hard-badge {
  position: absolute;
  left: 16px;
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: none;
}
#hard-badge.show { display: block; }

/* Toast */
#toast-container {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.toast {
  background: var(--text);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  animation: fadeIn 0.15s ease;
  white-space: nowrap;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* Board */
#board-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  padding: 10px 0;
}
#board {
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 5px;
  width: min(330px, 62vw);
  height: min(396px, 74vw);
}
.row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}
.tile {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: min(2rem, 7vw);
  font-weight: 700;
  text-transform: uppercase;
  border: 2px solid var(--tile-border);
  background: var(--tile-bg);
  aspect-ratio: 1;
  transition: transform 0.1s;
}
.tile.filled { border-color: #565758; animation: pop 0.1s ease; }
.tile.reveal { animation: flip 0.5s ease forwards; }
@keyframes pop { 50% { transform: scale(1.1); } }
@keyframes flip {
  0% { transform: rotateX(0); }
  45% { transform: rotateX(90deg); }
  55% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
.tile.correct { background: var(--green); border-color: var(--green); }
.tile.present { background: var(--yellow); border-color: var(--yellow); }
.tile.absent  { background: var(--grey);  border-color: var(--grey); }

.row.shake { animation: shake 0.5s ease; }
@keyframes shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(4px); }
  30%, 50%, 70% { transform: translateX(-6px); }
  40%, 60% { transform: translateX(6px); }
}

.tile.bounce { animation: bounce 1s ease; }
@keyframes bounce {
  0%, 20% { transform: translateY(0); }
  40% { transform: translateY(-30px); }
  50% { transform: translateY(5px); }
  60% { transform: translateY(-15px); }
  80% { transform: translateY(2px); }
  100% { transform: translateY(0); }
}

/* Keyboard */
#keyboard { padding: 8px 6px; flex-shrink: 0; }
.kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
.key {
  height: 52px;
  min-width: 30px;
  padding: 0 8px;
  border: none;
  border-radius: 4px;
  background: var(--key-bg);
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  flex: 1;
  max-width: 44px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s;
}
.key.wide { max-width: 66px; font-size: 12px; }
.key.correct { background: var(--green); }
.key.present { background: var(--yellow); }
.key.absent  { background: var(--dark-grey); }

/* Modal overlay (shared) */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #1a1a1b;
  border-radius: 12px;
  padding: 28px 24px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}

/* Stats modal */
#modal h2 { font-size: 22px; margin-bottom: 12px; }
#modal p { font-size: 14px; color: #aaa; margin-bottom: 6px; }
#modal .stat-row { display: flex; justify-content: center; gap: 16px; margin: 16px 0; }
#modal .stat { text-align: center; }
#modal .stat .num { font-size: 28px; font-weight: 700; }
#modal .stat .label { font-size: 11px; color: #aaa; }
#modal .bar-chart { margin: 12px 0; text-align: left; }
#modal .bar-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 13px; }
#modal .bar-row .bar {
  background: var(--dark-grey);
  color: white;
  padding: 2px 6px;
  min-width: 20px;
  text-align: right;
  font-size: 12px;
  font-weight: 700;
}
#modal .bar-row .bar.highlight { background: var(--green); }
#modal button.share-btn {
  margin-top: 16px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 24px;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}
#next-timer { font-size: 20px; font-weight: 700; margin-top: 8px; }

/* Settings modal */
#settings-modal .modal-box { text-align: left; }
#settings-modal h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--dark-grey);
}
.setting-row:last-child { border-bottom: none; }
.setting-info { flex: 1; padding-right: 16px; }
.setting-info .setting-name { font-size: 15px; font-weight: 600; }
.setting-info .setting-desc { font-size: 12px; color: #888; margin-top: 2px; }

/* Toggle switch */
.toggle {
  position: relative;
  width: 44px;
  height: 26px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider {
  position: absolute;
  inset: 0;
  background: var(--dark-grey);
  border-radius: 26px;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle .slider::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.3s;
}
.toggle input:checked + .slider { background: var(--green); }
.toggle input:checked + .slider::before { transform: translateX(18px); }
.toggle input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }

/* History section in stats */
#history-section { margin-top: 16px; border-top: 1px solid var(--dark-grey); padding-top: 12px; }
#history-section h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
#history-list {
  max-height: 150px;
  overflow-y: auto;
  text-align: left;
  font-size: 13px;
}
#history-list::-webkit-scrollbar { width: 4px; }
#history-list::-webkit-scrollbar-thumb { background: var(--dark-grey); border-radius: 2px; }
.history-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid #2a2a2b;
}
.history-row .h-date { color: #aaa; }
.history-row .h-result { font-weight: 700; }
.history-row .h-result.win { color: var(--green); }
.history-row .h-result.loss { color: var(--grey); }
</style>
</head>
<body>
<div id="app">
  <header>
    <span id="hard-badge">HARD</span>
    <h1>Wordle</h1>
    <button id="settings-btn" onclick="openSettings()">⚙️</button>
  </header>
  <div id="toast-container"></div>
  <div id="board-container"><div id="board"></div></div>
  <div id="keyboard"></div>
</div>

<!-- Stats modal -->
<div class="modal-overlay" id="stats-overlay">
  <div class="modal-box" id="modal">
    <h2 id="modal-title">Statistics</h2>
    <div class="stat-row">
      <div class="stat"><div class="num" id="s-played">0</div><div class="label">Played</div></div>
      <div class="stat"><div class="num" id="s-win">0</div><div class="label">Win %</div></div>
      <div class="stat"><div class="num" id="s-streak">0</div><div class="label">Current Streak</div></div>
      <div class="stat"><div class="num" id="s-max">0</div><div class="label">Max Streak</div></div>
    </div>
    <div class="bar-chart" id="bar-chart"></div>
    <div id="history-section">
      <h3>Recent Games</h3>
      <div id="history-list"></div>
    </div>
    <p>Next Wordle</p>
    <div id="next-timer">--:--:--</div>
    <button class="share-btn" onclick="shareResult()">Share</button>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <h2>Settings</h2>
    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-name">Hard Mode</div>
        <div class="setting-desc">Any revealed hints must be used in subsequent guesses</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="hard-mode-toggle" onchange="toggleHardMode(this.checked)">
        <span class="slider"></span>

    <div class="setting-row">

        <div class="setting-name">Day #</div>

</div>

// ─── Game constants ───
const WORD_LENGTH = 5;
const MAX_GUESSES = 6;
const WORDLE_EPOCH = new Date(2021, 5, 19); // June 19, 2021

// ─── Game state ───
let targetWord = '';
let currentRow = 0;
let currentCol = 0;
let currentGuess = '';
let gameOver = false;
let boardState = [];
let letterStates = {};
let hardMode = false;

// ─── Daily word selection (matches NYT algorithm) ───
function getDayNumber() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - WORDLE_EPOCH) / 86400000);
}

function getDailyWord() {
  const day = getDayNumber();
  return ANSWERS[day % ANSWERS.length].toUpperCase();
}

function getTodayKey() {
  const d = new Date();
  return `wordle-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getDateFromKey(key) {
  const m = key.match(/wordle-(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return `${m[3]}/${m[2]}/${m[1]}`;
}

// ─── Stats ───
function loadStats() {
  try { return JSON.parse(localStorage.getItem('wordle-stats')) || defaultStats(); }
  catch { return defaultStats(); }
}
function defaultStats() {
  return { played: 0, won: 0, streak: 0, maxStreak: 0, dist: [0,0,0,0,0,0], lastDate: null };
}
function saveStats(stats) { localStorage.setItem('wordle-stats', JSON.stringify(stats)); }

// ─── Game history (cross-day) ───
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('wordle-history')) || []; }
  catch { return []; }
}
function saveHistory(history) { localStorage.setItem('wordle-history', JSON.stringify(history)); }

function recordGame(won, guesses) {
  const history = loadHistory();
  const entry = { date: getTodayKey(), day: getDayNumber(), won, guesses, hardMode };
  // Don't duplicate
  if (!history.find(h => h.date === entry.date)) {
    history.push(entry);
    // Keep last 100
    if (history.length > 100) history.shift();
    saveHistory(history);
  }
}

// ─── Settings ───
function loadSettings() {
  try { return JSON.parse(localStorage.getItem('wordle-settings')) || {}; }
  catch { return {}; }
}
function saveSettings(s) { localStorage.setItem('wordle-settings', JSON.stringify(s)); }

function toggleHardMode(on) {
  // Can't turn on hard mode mid-game if guesses already made
  if (on && currentRow > 0 && !gameOver) {
    showToast('Hard Mode can only be enabled at the start of a round', 2000);
    document.getElementById('hard-mode-toggle').checked = false;
    return;
  }
  hardMode = on;
  const settings = loadSettings();
  settings.hardMode = on;
  saveSettings(settings);
  document.getElementById('hard-badge').classList.toggle('show', on);
  // Also update toggle state
  document.getElementById('hard-mode-toggle').checked = on;
  // Disable toggle if game in progress
  updateHardModeToggle();
  saveGame();
}

function updateHardModeToggle() {
  const toggle = document.getElementById('hard-mode-toggle');
  toggle.disabled = currentRow > 0 && !gameOver && !hardMode;
}

// ─── Hard mode validation ───
function validateHardMode(guess) {
  if (!hardMode || boardState.length === 0) return null;

  for (const prev of boardState) {
    for (let i = 0; i < WORD_LENGTH; i++) {
      const letter = prev.guess[i];
      const state = prev.result[i];

      if (state === 'correct') {
        if (guess[i] !== letter) {
          return `${ordinal(i+1)} letter must be ${letter}`;
        }
      }
      if (state === 'present') {
        if (!guess.includes(letter)) {
          return `Guess must contain ${letter}`;
        }
      }
    }
  }
  return null;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// ─── Save/Load game ───
function saveGame() {
  localStorage.setItem(getTodayKey(), JSON.stringify({
    boardState, currentRow, currentCol, currentGuess, gameOver, letterStates, hardMode
  }));
}
function loadGame() {
  try { return JSON.parse(localStorage.getItem(getTodayKey())); } catch { return null; }
}

// ─── Build board ───
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

// ─── Build keyboard ───
function buildKeyboard() {
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.id = `key-${key}`;
      btn.addEventListener('click', () => handleKey(key));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

// ─── Toast ───
function showToast(msg, duration = 1500) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, duration - 300);
  setTimeout(() => container.removeChild(toast), duration);
}

// ─── Input handling ───
function handleKey(key) {
  if (gameOver) return;
  if (key === '⌫' || key === 'BACKSPACE') {
    if (currentCol > 0) {
      currentCol--;
      currentGuess = currentGuess.slice(0, -1);
      const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
      tile.textContent = '';
      tile.classList.remove('filled');
    }
  } else if (key === 'ENTER') {
    submitGuess();
  } else if (key.length === 1 && /^[A-Z]$/i.test(key) && currentCol < WORD_LENGTH) {
    const letter = key.toUpperCase();
    const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
    tile.textContent = letter;
    tile.classList.add('filled');
    currentGuess += letter;
    currentCol++;
  }
}

// ─── Submit guess ───
function submitGuess() {
  if (currentCol < WORD_LENGTH) {
    shakeRow(currentRow);
    showToast('Not enough letters');
    return;
  }
  if (!VALID_GUESSES.has(currentGuess.toLowerCase())) {
    shakeRow(currentRow);
    showToast('Not in word list');
    return;
  }

  // Hard mode check
  const hardError = validateHardMode(currentGuess);
  if (hardError) {
    shakeRow(currentRow);
    showToast(hardError, 2000);
    return;
  }

  const result = evaluateGuess(currentGuess, targetWord);
  boardState.push({ guess: currentGuess, result });
  revealRow(currentRow, result);

  const won = result.every(r => r === 'correct');
  if (won) {
    gameOver = true;
    setTimeout(() => {
      bounceRow(currentRow);
      const msgs = ['Genius', 'Magnificent', 'Impressive', 'Splendid', 'Great', 'Phew'];
      showToast(msgs[currentRow] || 'Nice!');
    }, WORD_LENGTH * 300 + 200);
    setTimeout(() => {
      const stats = loadStats();
      stats.played++;
      stats.won++;
      // Streak: check if last game was yesterday
      const today = getTodayKey();
      if (stats.lastDate) {
        const last = new Date(stats.lastDate.replace('wordle-',''));
        const now = new Date(today.replace('wordle-',''));
        const diffDays = Math.round((now - last) / 86400000);
        if (diffDays === 1) {
          stats.streak++;
        } else if (diffDays > 1) {
          stats.streak = 1;
        }
        // diffDays === 0 shouldn't happen (same day), keep streak
      } else {
        stats.streak = 1;
      }
      stats.maxStreak = Math.max(stats.maxStreak, stats.streak);
      stats.dist[currentRow]++;
      stats.lastDate = today;
      saveStats(stats);
      recordGame(true, currentRow + 1);
      showStatsModal(stats, currentRow);
    }, WORD_LENGTH * 300 + 1600);
    currentRow++;
    saveGame();
    updateHardModeToggle();
    return;
  }

  currentRow++;
  currentCol = 0;
  currentGuess = '';

  if (currentRow >= MAX_GUESSES) {
    gameOver = true;
    setTimeout(() => showToast(targetWord, 3000), WORD_LENGTH * 300 + 200);
    setTimeout(() => {
      const stats = loadStats();
      stats.played++;
      stats.streak = 0;
      stats.lastDate = getTodayKey();
      saveStats(stats);
      recordGame(false, -1);
      showStatsModal(stats, -1);
    }, WORD_LENGTH * 300 + 1600);
  }
  saveGame();
  updateHardModeToggle();
}

// ─── Evaluate guess ───
function evaluateGuess(guess, target) {
  const result = Array(WORD_LENGTH).fill('absent');
  const targetArr = target.split('');
  const guessArr = guess.split('');
  const used = Array(WORD_LENGTH).fill(false);

  for (let i = 0; i < WORD_LENGTH; i++) {
    if (guessArr[i] === targetArr[i]) {
      result[i] = 'correct';
      used[i] = true;
    }
  }
  for (let i = 0; i < WORD_LENGTH; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < WORD_LENGTH; j++) {
      if (!used[j] && guessArr[i] === targetArr[j]) {
        result[i] = 'present';
        used[j] = true;
        break;
      }
    }
  }
  return result;
}

// ─── Reveal animation ───
function revealRow(row, result) {
  const guess = boardState[row].guess;
  for (let i = 0; i < WORD_LENGTH; i++) {
    const tile = document.getElementById(`tile-${row}-${i}`);
    setTimeout(() => {
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.add(result[i]);
        updateKeyboard(guess[i], result[i]);
      }, 250);
    }, i * 300);
  }
}

// ─── Keyboard colors ───
const priority = { correct: 3, present: 2, absent: 1 };
function updateKeyboard(letter, state) {
  const key = document.getElementById(`key-${letter}`);
  if (!key) return;
  const current = letterStates[letter];
  if (!current || priority[state] > priority[current]) {
    letterStates[letter] = state;
    key.className = 'key' + (key.textContent.length > 1 ? ' wide' : '') + ' ' + state;
  }
}

// ─── Row animations ───
function shakeRow(row) {
  const el = document.getElementById(`row-${row}`);
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
}
function bounceRow(row) {
  for (let i = 0; i < WORD_LENGTH; i++) {
    const tile = document.getElementById(`tile-${row}-${i}`);
    setTimeout(() => tile.classList.add('bounce'), i * 100);
  }
}

// ─── Stats Modal ───
function showStatsModal(stats, wonRow) {
  document.getElementById('s-played').textContent = stats.played;
  document.getElementById('s-win').textContent = stats.played ? Math.round(100 * stats.won / stats.played) : 0;
  document.getElementById('s-streak').textContent = stats.streak;
  document.getElementById('s-max').textContent = stats.maxStreak;
  document.getElementById('modal-title').textContent = wonRow >= 0 ? 'You Won!' : 'Better Luck Next Time';

  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  const maxVal = Math.max(...stats.dist, 1);
  for (let i = 0; i < 6; i++) {
    const row = document.createElement('div');
    row.className = 'bar-row';
    const label = document.createElement('span');
    label.textContent = i + 1;
    const bar = document.createElement('div');
    bar.className = 'bar' + (i === wonRow ? ' highlight' : '');
    bar.style.width = Math.max(8, (stats.dist[i] / maxVal) * 100) + '%';
    bar.textContent = stats.dist[i];
    row.appendChild(label);
    row.appendChild(bar);
    chart.appendChild(row);
  }

  // Render history
  const histList = document.getElementById('history-list');
  histList.innerHTML = '';
  const history = loadHistory().slice(-15).reverse();
  history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const dateSpan = document.createElement('span');
    dateSpan.className = 'h-date';
    dateSpan.textContent = getDateFromKey(h.date) + (h.hardMode ? ' ★' : '');
    const resultSpan = document.createElement('span');
    resultSpan.className = 'h-result ' + (h.won ? 'win' : 'loss');
    resultSpan.textContent = h.won ? `${h.guesses}/6` : 'X/6';
    row.appendChild(dateSpan);
    row.appendChild(resultSpan);
    histList.appendChild(row);
  });

  document.getElementById('stats-overlay').classList.add('show');
  updateTimer();
}

function updateTimer() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - now;
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  document.getElementById('next-timer').textContent = `${h}:${m}:${s}`;
  if (gameOver) setTimeout(updateTimer, 1000);
}

// ─── Settings Modal ───
function openSettings() {
  document.getElementById('day-number-label').textContent = `Wordle #${getDayNumber()}`;
  document.getElementById('hard-mode-toggle').checked = hardMode;
  updateHardModeToggle();
  document.getElementById('settings-modal').classList.add('show');
}

// ─── Share ───
function shareResult() {
  const emojiMap = { correct: '🟩', present: '🟨', absent: '⬛' };
  const day = getDayNumber();
  const won = boardState.length <= MAX_GUESSES && boardState[boardState.length-1]?.result.every(r => r === 'correct');
  let text = `Wordle ${day} ${won ? boardState.length : 'X'}/6${hardMode ? '*' : ''}\n\n`;
  boardState.forEach(row => {
    text += row.result.map(r => emojiMap[r]).join('') + '\n';
  });
  if (navigator.share) {
    navigator.share({ text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    showToast('Copied to clipboard!');
  }
}

// ─── Physical keyboard ───
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

// ─── Close modals ───
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
});

// ─── Init ───
function init() {
  targetWord = getDailyWord();
  buildBoard();
  buildKeyboard();

  // Load settings
  const settings = loadSettings();
  hardMode = settings.hardMode || false;
  document.getElementById('hard-badge').classList.toggle('show', hardMode);
  document.getElementById('hard-mode-toggle').checked = hardMode;

  const saved = loadGame();
  if (saved) {
    boardState = saved.boardState || [];
    currentRow = saved.currentRow;
    currentCol = saved.currentCol;
    currentGuess = saved.currentGuess;
    gameOver = saved.gameOver;
    letterStates = saved.letterStates || {};
    if (saved.hardMode !== undefined) hardMode = saved.hardMode;
    document.getElementById('hard-badge').classList.toggle('show', hardMode);
    document.getElementById('hard-mode-toggle').checked = hardMode;

    // Restore tiles
    boardState.forEach((entry, r) => {
      for (let c = 0; c < WORD_LENGTH; c++) {
        const tile = document.getElementById(`tile-${r}-${c}`);
        tile.textContent = entry.guess[c];
        tile.classList.add('filled', entry.result[c]);
      }
    });
    // Restore keyboard
    Object.entries(letterStates).forEach(([letter, state]) => {
      const key = document.getElementById(`key-${letter}`);
      if (key) key.classList.add(state);
    });

    if (gameOver) {
      setTimeout(() => showStatsModal(loadStats(),
        boardState.length <= MAX_GUESSES && boardState[boardState.length-1]?.result.every(r => r === 'correct')
          ? boardState.length - 1 : -1
      ), 500);
    }
  }

  updateHardModeToggle();
}

init();
</script>
